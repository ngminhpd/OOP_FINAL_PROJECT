<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Ngân Hàng OOP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="screen">
        <div class="login-box">
            <h1>OOP BANK</h1>
            <div id="login-form">
                <input type="text" id="login-user" placeholder="Số tài khoản">
                <input type="password" id="login-pin" placeholder="Mã PIN">
                <button id="btn-login" onclick="handleLogin()">Đăng Nhập</button>
                <div class="links" style="margin-top:10px;">
                    <a href="#" onclick="showForm('register-form')">Đăng ký mới</a> | 
                    <a href="#" onclick="showForm('forgot-form')">Quên mã PIN</a>
                </div>
            </div>

            <!-- Form Đăng ký đầy đủ -->
            <div id="register-form" style="display:none;">
                <h3>Đăng ký tài khoản</h3>
                <input type="text" id="reg-stk" placeholder="Số TK (7 số)">
                <input type="text" id="reg-ten" placeholder="Họ và Tên">
                <input type="text" id="reg-sdt" placeholder="Số điện thoại">
                <input type="text" id="reg-dc" placeholder="Địa chỉ">
                <input type="password" id="reg-pin" placeholder="Mã PIN">
                <button onclick="handleRegister()">Tạo tài khoản</button>
                <a href="#" onclick="showForm('login-form')" style="display:block; margin-top:10px;">Quay lại</a>
            </div>

            <div id="forgot-form" style="display:none;">
                <h3>Khôi phục mã PIN</h3>
                <input type="text" id="forgot-stk" placeholder="Nhập số tài khoản">
                <button onclick="handleForgot()">Lấy lại mã PIN</button>
                <a href="#" onclick="showForm('login-form')" style="display:block; margin-top:10px;">Quay lại</a>
            </div>
            <p id="msg" style="margin-top:15px; padding:10px; border-radius:5px;"></p>
        </div>
    </div>

    <div id="main-screen" class="screen" style="display:none;">
        <div class="sidebar">
            <h2 id="sidebar-role">NGÂN HÀNG</h2>
            <nav id="nav-user">
                <button onclick="showSection('user-home')">🏠 Trang chủ</button>
                <button onclick="showSection('user-trans')">💸 Giao dịch</button>
            </nav>
            <nav id="nav-admin" style="display:none;">
                <button onclick="showSection('admin-home')">👥 Danh sách TK</button>
            </nav>
            <button class="btn-logout" onclick="location.reload()" style="margin-top:auto;">🚪 Đăng xuất</button>
        </div>

        <div class="content">
            <div id="user-home" class="section">
                <h1 id="welcome">Chào mừng!</h1>
                <div class="card" style="background: linear-gradient(135deg, #38bdf8, #818cf8); padding: 2rem; border-radius: 1rem;">
                    <p>Số dư tài khoản</p>
                    <h2 id="user-balance" style="font-size: 2.5rem;">0 VND</h2>
                </div>
            </div>

            <div id="user-trans" class="section" style="display:none;">
                <h1>Giao dịch tài khoản</h1>
                <div style="background: #1e293b; padding: 2rem; border-radius: 1rem; max-width: 400px;">
                    <label>Số tiền:</label>
                    <input type="number" id="amt" style="width:100%; padding:10px; margin:10px 0; border-radius:5px; background:#0f172a; color:white; border:1px solid #334155;">
                    <div style="display:flex; gap:10px;">
                        <button onclick="doAction('nap')" style="flex:1; background:#34a853;">Nạp tiền</button>
                        <button onclick="doAction('rut')" style="flex:1; background:#ea4335;">Rút tiền</button>
                    </div>
                </div>
            </div>

            <div id="admin-home" class="section" style="display:none;">
                <h1>Quản lý tài khoản (Admin)</h1>
                <table id="admin-table" border="1" style="width:100%; border-collapse:collapse; background:#1e293b;">
                    <thead><tr style="background:#334155;"><th>STK</th><th>Chủ TK</th><th>Số dư</th><th>Trạng thái</th></tr></thead>
                    <tbody id="admin-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let userData = null;

        function showForm(id) {
            ['login-form', 'register-form', 'forgot-form'].forEach(f => document.getElementById(f).style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.getElementById('msg').innerText = "";
        }

        async function handleLogin() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pin').value;
            const res = await fetch(`http://localhost:8080/api/login?user=${encodeURIComponent(u)}&pin=${encodeURIComponent(p)}`);
            const data = await res.json();
            if(data.status === "success") {
                userData = data;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'flex';
                if(data.role === 'admin') {
                    document.getElementById('nav-admin').style.display = 'block';
                    document.getElementById('nav-user').style.display = 'none';
                    showSection('admin-home'); loadAdmin();
                } else {
                    document.getElementById('welcome').innerText = "Chào mừng " + data.name;
                    showSection('user-home'); loadUser();
                }
            } else {
                document.getElementById('msg').innerText = "❌ Sai STK hoặc mã PIN!";
                document.getElementById('msg').style.color = "#ff4d4d";
            }
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        async function loadUser() {
            const res = await fetch(`http://localhost:8080/api/user/info?stk=${userData.stk}`);
            const data = await res.json();
            document.getElementById('user-balance').innerText = data.balance.toLocaleString() + " VND";
        }

        async function loadAdmin() {
            const res = await fetch('http://localhost:8080/api/admin/all');
            const data = await res.json();
            document.getElementById('admin-list').innerHTML = data.map(a => `
                <tr style="border-bottom: 1px solid #334155;">
                    <td style="padding:10px;">${a.stk}</td>
                    <td style="padding:10px;">${a.name}</td>
                    <td style="padding:10px;">${a.balance.toLocaleString()} VND</td>
                    <td style="padding:10px;">${a.locked ? 'Khóa' : 'Hoạt động'}</td>
                </tr>`).join('');
        }

        async function doAction(type) {
            const a = document.getElementById('amt').value;
            if(!a || a <= 0) return alert("Vui lòng nhập số tiền!");
            await fetch(`http://localhost:8080/api/user/transact?stk=${userData.stk}&type=${type}&amount=${a}`);
            alert("Giao dịch thành công!");
            loadUser();
        }

        async function handleRegister() {
            const s = document.getElementById('reg-stk').value;
            const t = document.getElementById('reg-ten').value;
            const sdt = document.getElementById('reg-sdt').value;
            const dc = document.getElementById('reg-dc').value;
            const p = document.getElementById('reg-pin').value;
            if(!s || !t || !p) return alert("Vui lòng nhập đủ thông tin!");
            
            const url = `http://localhost:8080/api/register?stk=${s}&ten=${t}&sdt=${sdt}&dc=${dc}&pin=${p}`;
            const res = await fetch(url);
            alert("Đăng ký thành công! Dữ liệu đã được lưu vào hệ thống.");
            showForm('login-form');
        }

        async function handleForgot() {
            const res = await fetch(`http://localhost:8080/api/forgot?stk=${document.getElementById('forgot-stk').value}`);
            document.getElementById('msg').innerText = await res.text();
            document.getElementById('msg').style.color = "cyan";
        }
    </script>
</body>
</html>
